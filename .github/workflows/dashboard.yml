name: Dashboard CI

on:
  push:
    branches: [main]
    paths:
      - 'tools/dashboard/**'
  pull_request:
    branches: [main]
    paths:
      - 'tools/dashboard/**'

jobs:
  check:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: tools/dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run check

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test --run
