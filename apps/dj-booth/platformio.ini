; DJ Booth controller — 26x32 WS2812B LED grid on ESP32
;
; Slice 1 sets up the build, control/state plumbing, and a solid-color render loop.

[env]
lib_extra_dirs = ../../shared/lib
monitor_speed = 115200

[env:esp32]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
board = esp32dev
framework = arduino
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_ESP_MATTER_ENABLE_DATA_MODEL=1
lib_deps =
    makuna/NeoPixelBus@^2.8.0

[env:native]
platform = native
build_flags =
    -std=c++17
    -DNATIVE_BUILD
build_src_filter = -<*> +<main.cpp> +<matrix.cpp> +<state.cpp> +<control.cpp> +<effects.cpp> +<audio.cpp> +<web_ui.cpp> +<matter_ep.cpp>
test_build_src = true
lib_ignore =
    LEDStrip
    NeoPixelBus
    LEDPWM
    Connectivity
    AudioInput
