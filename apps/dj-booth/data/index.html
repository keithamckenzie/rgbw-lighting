<!doctype html><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>DJ Booth</title><style>:root{--bg:#07090e;--card:#111622;--card2:#191f2d;--line:#2a334a;--text:#eff3ff;--muted:#98a4c9;--accent:#ff7a5c;--ok:#7ef0bf;font-family:"Avenir Next","Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#1f2740,#07090e 55%);color:var(--text)}main{max-width:28rem;margin:auto;padding:1rem;display:grid;gap:1rem}h1{margin:.1rem 0;font-size:1.65rem;letter-spacing:.06em;text-transform:uppercase}p,output{margin:0;color:var(--muted)}.card{background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:1rem;padding:1rem;box-shadow:0 1rem 2.5rem rgba(0,0,0,.35)}.row{display:flex;align-items:center;justify-content:space-between;gap:.75rem}.stack{display:grid;gap:.7rem}.big{width:100%;padding:.95rem 1rem;border:0;border-radius:.85rem;background:linear-gradient(90deg,var(--accent),#ffd166);color:#180d08;font-weight:700}.big[aria-pressed=true]{background:linear-gradient(90deg,#0dd39c,#82f0bf)}label{display:grid;gap:.35rem;font-size:.95rem}input,select,button{font:inherit}input[type=range]{width:100%}select{width:100%;padding:.7rem;border-radius:.8rem;border:1px solid var(--line);background:#0e1220;color:var(--text)}#swatch{height:3.25rem;border-radius:.9rem;border:1px solid rgba(255,255,255,.08);box-shadow:inset 0 0 0 1px rgba(255,255,255,.04)}canvas{width:100%;height:7rem;display:block;background:linear-gradient(180deg,#0d1320,#080b12);border-radius:.9rem;border:1px solid rgba(255,255,255,.05)}small{color:var(--muted)}@media(min-width:720px){main{max-width:34rem}}</style><main><section class=card><div class=row><div><small>Live control</small><h1>DJ Booth</h1></div><p id=status>Connecting…</p></div></section><section class="card stack"><button id=power class=big type=button aria-pressed=false>Lights Off</button><label>Brightness <output id=briVal>0</output><input id=brightness type=range min=0 max=255 value=0></label><div id=swatch aria-hidden=true></div></section><section class="card stack"><label>Effect<select id=effect></select></label><label>Hue <output id=hVal>0</output><input id=hue type=range min=0 max=360 value=0></label><label>Saturation <output id=sVal>0</output><input id=sat type=range min=0 max=255 value=0></label><label>Value <output id=vVal>0</output><input id=val type=range min=0 max=255 value=0></label></section><section class="card stack"><div class=row><strong>Spectrum</strong><small id=beat>Beat idle</small></div><canvas id=viz width=320 height=120 aria-label="Audio spectrum visualizer"></canvas></section></main><script>const $=s=>document.querySelector(s),st={power:false,brightness:0,hue:0,sat:0,val:0,effectIndex:0};let mute=0,timers={},bars=new Array(8).fill(0);const els={status:$("#status"),power:$("#power"),brightness:$("#brightness"),briVal:$("#briVal"),effect:$("#effect"),hue:$("#hue"),hVal:$("#hVal"),sat:$("#sat"),sVal:$("#sVal"),val:$("#val"),vVal:$("#vVal"),swatch:$("#swatch"),beat:$("#beat"),viz:$("#viz")},ctx=els.viz.getContext("2d"),post=(u,b)=>fetch(u,{method:"POST",headers:{"Content-Type":"application/json"},body:b?JSON.stringify(b):null}).catch(()=>els.status.textContent="Offline"),later=(k,fn)=>{clearTimeout(timers[k]);timers[k]=setTimeout(fn,100)};function sync(s){mute=1;Object.assign(st,s);els.power.textContent=s.power?"Lights On":"Lights Off";els.power.setAttribute("aria-pressed",s.power);els.brightness.value=s.brightness;els.briVal.value=s.brightness;els.effect.value=String(s.effectIndex);els.hue.value=s.hue;els.hVal.value=s.hue;els.sat.value=s.sat;els.sVal.value=s.sat;els.val.value=s.val;els.vVal.value=s.val;const sp=s.sat/255*100,vp=Math.max(8,s.val/255*55);els.swatch.style.background=`linear-gradient(135deg,hsl(${s.hue} ${sp}% ${vp}%),hsl(${(s.hue+40)%360} ${Math.min(100,sp+8)}% ${Math.min(82,vp+18)}%))`;mute=0}function draw(){ctx.clearRect(0,0,320,120);bars=bars.map(v=>v*.82);const w=28,g=10;bars.forEach((v,i)=>{const h=Math.max(6,Math.min(110,v*110)),x=10+i*(w+g),y=118-h;ctx.fillStyle=`hsl(${200+i*16} 90% ${55+v*18}%)`;ctx.fillRect(x,y,w,h)})}function applySpectrum(d){bars=(d.bands||bars).map(v=>Math.max(0,Math.min(1,Number(v)||0)));els.beat.textContent=d.beat?`Beat ${Math.round(Number(d.bpm)||0)} BPM`:"Beat idle";draw()}function populateEffects(effects){els.effect.length=0;(Array.isArray(effects)?effects:[]).forEach(effect=>els.effect.add(new Option(effect.name,effect.index)));els.effect.value=String(st.effectIndex)}function loadEffects(){return fetch("/api/effects").then(r=>{if(!r.ok)throw new Error("effects");return r.json()}).then(populateEffects).catch(()=>els.status.textContent="Effects unavailable")}function loadState(){return fetch("/api/state").then(r=>{if(!r.ok)throw new Error("state");return r.json()}).then(sync).catch(()=>els.status.textContent="State unavailable")}function boot(){loadEffects();loadState();const es=new EventSource("/api/events");es.onopen=()=>els.status.textContent="Live";es.onerror=()=>els.status.textContent="Reconnecting…";es.addEventListener("state",e=>sync(JSON.parse(e.data)));es.addEventListener("spectrum",e=>applySpectrum(JSON.parse(e.data)))}els.power.onclick=()=>post("/api/power",{on:!st.power});els.brightness.oninput=e=>{els.briVal.value=e.target.value;if(mute)return;later("b",()=>post("/api/brightness",{value:+els.brightness.value}))};[els.hue,els.sat,els.val].forEach(el=>el.oninput=e=>{({hue:els.hVal,sat:els.sVal,val:els.vVal}[e.target.id]).value=e.target.value;if(mute)return;sync({power:st.power,brightness:+els.brightness.value,hue:+els.hue.value,sat:+els.sat.value,val:+els.val.value,effectIndex:+els.effect.value});later("c",()=>post("/api/color",{h:+els.hue.value,s:+els.sat.value,v:+els.val.value}))});els.effect.onchange=()=>!mute&&post("/api/effect",{index:+els.effect.value});draw();boot();</script>
